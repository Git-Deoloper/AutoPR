version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: localclaw-ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_DEBUG=false
    volumes:
      - ollama-data:/root/.ollama
    command: serve
    networks:
      - localclaw-network

  localclaw:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: localclaw-web
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEB_HOST=0.0.0.0
      - WEB_PORT=8000
    depends_on:
      - ollama
    networks:
      - localclaw-network
    command: python -m localclaw.web.server

volumes:
  ollama-data:
    driver: local

networks:
  localclaw-network:
    driver: bridge
